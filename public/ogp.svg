<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 背景グラデーション -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 左の装飾ライン -->
  <rect x="0" y="0" width="8" height="630" fill="#2563EB"/>

  <!-- アイコン -->
  <rect x="80" y="180" width="80" height="80" rx="20" fill="#2563EB"/>
  <rect x="92" y="192" width="56" height="20" rx="5" fill="white" opacity="0.9"/>
  <rect x="92" y="220" width="14" height="12" rx="3" fill="white" opacity="0.8"/>
  <rect x="113" y="220" width="14" height="12" rx="3" fill="white" opacity="0.8"/>
  <rect x="134" y="220" width="14" height="12" rx="3" fill="#93C5FD"/>
  <rect x="92" y="238" width="14" height="12" rx="3" fill="white" opacity="0.8"/>
  <rect x="113" y="238" width="14" height="12" rx="3" fill="white" opacity="0.8"/>
  <rect x="134" y="238" width="14" height="12" rx="3" fill="#93C5FD"/>

  <!-- タイトル -->
  <text x="80" y="320" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="72" font-weight="bold" fill="#1E3A8A">副業ぜんぶ計算くん</text>

  <!-- サブタイトル -->
  <text x="80" y="390" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="34" fill="#3B82F6">手取り・税金・確定申告・会社バレリスクを1画面でまとめて確認</text>

  <!-- タグ -->
  <rect x="80" y="430" width="180" height="48" rx="24" fill="#2563EB"/>
  <text x="170" y="462" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" fill="white" text-anchor="middle">登録不要</text>

  <rect x="276" y="430" width="120" height="48" rx="24" fill="#2563EB"/>
  <text x="336" y="462" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" fill="white" text-anchor="middle">無料</text>

  <rect x="412" y="430" width="180" height="48" rx="24" fill="#2563EB"/>
  <text x="502" y="462" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" fill="white" text-anchor="middle">スマホ対応</text>

  <!-- URL -->
  <text x="80" y="565" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="26" fill="#93C5FD">fukugyo-keisan.vercel.app</text>

  <!-- 右側の装飾グラフ -->
  <rect x="800" y="150" width="40" height="180" rx="6" fill="#BFDBFE"/>
  <rect x="860" y="220" width="40" height="110" rx="6" fill="#93C5FD"/>
  <rect x="920" y="180" width="40" height="150" rx="6" fill="#60A5FA"/>
  <rect x="980" y="120" width="40" height="210" rx="6" fill="#3B82F6"/>
  <rect x="1040" y="80" width="40" height="250" rx="6" fill="#2563EB"/>
  <rect x="1100" y="50" width="40" height="280" rx="6" fill="#1D4ED8"/>
  <!-- グラフ底線 -->
  <rect x="790" y="328" width="360" height="4" rx="2" fill="#93C5FD"/>
</svg>
